<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NAVICUS Research Daily DB</title>
  <style>
    :root {
      --bg:#f5f7fb; --panel:#fff; --panel-2:#f9fbff; --ink:#172033; --muted:#667085; --line:#dce3ee; --line-2:#edf1f7;
      --brand:#335cff; --brand-2:#0a85ff; --accent:#04a777; --danger:#d92d20; --warning:#f79009;
      --shadow:0 18px 45px rgba(16,24,40,.08); --shadow-soft:0 8px 20px rgba(16,24,40,.05);
      --radius-xl:28px; --radius-lg:22px; --radius-md:16px; --side:318px;
      --S:#5b21b6; --A:#1d4ed8; --B:#047857; --C:#b7791f; --D:#c2410c; --E:#be123c; --F:#525252;
    }
    * { box-sizing:border-box; } html { scroll-behavior:smooth; }
    body { margin:0; font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif; background:radial-gradient(circle at top left,rgba(51,92,255,.12),transparent 28rem),radial-gradient(circle at 88% 12%,rgba(4,167,119,.12),transparent 30rem),var(--bg); color:var(--ink); line-height:1.55; }
    button,input,select,textarea { font:inherit; } button { cursor:pointer; }
    .app { min-height:100vh; display:grid; grid-template-columns:var(--side) minmax(0,1fr); }
    .sidebar { position:sticky; top:0; height:100vh; overflow:auto; padding:22px 18px 28px; border-right:1px solid var(--line); background:rgba(255,255,255,.86); backdrop-filter:blur(18px); z-index:20; }
    .sidebar h1 { margin:0 0 4px; font-size:20px; letter-spacing:0; line-height:1.25; }
    .sidebar .sub { margin:0 0 16px; color:var(--muted); font-size:12px; }
    .db-status,.filter-card { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius-lg); padding:14px; margin-bottom:12px; box-shadow:var(--shadow-soft); }
    .db-status { background:linear-gradient(180deg,#fff,#f8fbff); margin-bottom:16px; }
    .db-status .row { display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1.2fr); align-items:flex-start; gap:12px; margin:7px 0; font-size:13px; }
    .db-status .row span,.db-status .row strong { min-width:0; }
    .db-status .row strong { text-align:right; overflow-wrap:anywhere; word-break:break-all; }
    .dot { width:9px; height:9px; display:inline-block; border-radius:999px; background:var(--accent); box-shadow:0 0 0 5px rgba(4,167,119,.12); margin-right:6px; }
    .filter-card h3 { margin:0 0 10px; font-size:13px; color:#25314a; letter-spacing:0; display:flex; justify-content:space-between; }
    .filter-card h3 span { color:var(--muted); font-size:11px; font-weight:800; }
    .control,.select { width:100%; border:1px solid var(--line); background:#fff; border-radius:13px; padding:10px 12px; outline:none; color:var(--ink); min-height:42px; }
    .control:focus,.select:focus { border-color:rgba(51,92,255,.55); box-shadow:0 0 0 4px rgba(51,92,255,.11); }
    .check-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; }
    .pill-check { display:flex; align-items:center; gap:7px; min-height:35px; border:1px solid var(--line-2); border-radius:999px; padding:6px 9px; background:var(--panel-2); font-size:12px; color:#344054; user-select:none; }
    .pill-check input { accent-color:var(--brand); }
    .side-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
    .btn { border:1px solid var(--line); border-radius:13px; padding:10px 12px; background:#fff; color:#25314a; font-weight:850; min-height:40px; }
    .btn.primary { border-color:transparent; color:#fff; background:linear-gradient(135deg,var(--brand),var(--brand-2)); box-shadow:0 10px 22px rgba(51,92,255,.22); }
    .btn:hover { transform:translateY(-1px); }
    main { min-width:0; padding:28px clamp(18px,3vw,42px) 48px; }
    .toolbar { position:sticky; top:0; z-index:10; display:grid; grid-template-columns:minmax(0,1fr) repeat(6,max-content); gap:12px; align-items:center; border:1px solid var(--line); border-radius:22px; background:rgba(255,255,255,.88); backdrop-filter:blur(16px); padding:12px; box-shadow:var(--shadow-soft); margin-bottom:18px; }
    .result-title { min-width:0; display:flex; align-items:center; gap:10px; color:#344054; font-weight:850; }
    .result-count { display:inline-flex; align-items:center; justify-content:center; min-width:36px; border-radius:999px; padding:5px 9px; background:#eef4ff; color:#2442c2; font-weight:950; }
    .deadline-tabs { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; margin:0 0 14px; }
    .deadline-tab { border:1px solid var(--line); border-radius:16px; background:rgba(255,255,255,.9); color:#344054; padding:10px 12px; min-height:46px; display:flex; align-items:center; justify-content:space-between; gap:10px; font-weight:900; box-shadow:var(--shadow-soft); text-align:left; }
    .deadline-tab.active { border-color:rgba(51,92,255,.45); background:#eef4ff; color:#2442c2; box-shadow:0 10px 22px rgba(51,92,255,.12); }
    .deadline-tab-count { display:inline-flex; min-width:32px; height:26px; border-radius:999px; align-items:center; justify-content:center; background:#fff; color:#25314a; padding:2px 8px; font-size:12px; font-weight:950; }
    .cards { display:grid; gap:16px; }
    .pager { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin:14px 0; }
    .pager-group { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .pager button:disabled { opacity:.45; cursor:not-allowed; }
    .page-size { border:1px solid var(--line); border-radius:12px; padding:10px 12px; font-weight:800; background:#fff; }

    .pager { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin:14px 0; }
    .pager-group { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .pager button:disabled { opacity:.45; cursor:not-allowed; }
    .page-size { border:1px solid var(--line); border-radius:12px; padding:10px 12px; font-weight:800; background:#fff; }

    .proposal-card { position:relative; border:1px solid var(--line); border-radius:var(--radius-xl); background:rgba(255,255,255,.9); box-shadow:var(--shadow); overflow:hidden; }
    .proposal-card.stopped { opacity:.82; }
    .card-head { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 18px 0 24px; }
    .rank { display:inline-flex; align-items:center; flex-wrap:wrap; gap:8px; font-size:12px; font-weight:950; color:#344054; }
    .rank strong { display:inline-grid; place-items:center; min-width:42px; height:30px; border-radius:999px; background:#101828; color:#fff; }
    .rank .origin { color:var(--muted); font-weight:850; }
    .decision { display:inline-flex; align-items:center; gap:7px; padding:7px 10px; border:1px solid var(--line); border-radius:999px; color:#344054; background:#fff; font-size:12px; font-weight:900; }
    .decision-dot { width:8px; height:8px; border-radius:999px; background:var(--grade-color,var(--brand)); }
    .bento { padding:14px 18px 16px 24px; display:grid; grid-template-columns:1.35fr 1fr .64fr; grid-template-areas:"title title grade" "content content deadline" "eligibility budget deadline" "issuer labels labels"; gap:12px; }
    .tile { border:1px solid var(--line-2); border-radius:20px; background:linear-gradient(180deg,#fff,#fbfcff); padding:15px; min-width:0; }
    .tile-title { grid-area:title; } .tile-grade { grid-area:grade; } .tile-content { grid-area:content; } .tile-deadline { grid-area:deadline; } .tile-eligibility { grid-area:eligibility; } .tile-budget { grid-area:budget; } .tile-issuer { grid-area:issuer; } .tile-labels { grid-area:labels; }
    .tile-kicker { display:flex; align-items:center; gap:8px; color:var(--muted); font-size:11px; font-weight:950; text-transform:uppercase; letter-spacing:0; margin-bottom:8px; }
    .tile h2 { margin:0; font-size:clamp(18px,2.1vw,27px); letter-spacing:0; line-height:1.18; }
    .tile h2 a { color:inherit; text-decoration:none; overflow-wrap:anywhere; }
    .tile p { margin:0; color:#475467; font-size:14px; }
    .grade-badge { display:inline-flex; align-items:center; justify-content:center; width:78px; height:78px; border-radius:24px; color:#fff; background:var(--grade-color,var(--brand)); font-size:36px; font-weight:1000; letter-spacing:0; box-shadow:0 14px 28px color-mix(in srgb,var(--grade-color,var(--brand)) 28%,transparent); margin-bottom:11px; }
    .score-line { color:var(--muted); font-size:12px; font-weight:800; }
    .days { font-size:30px; font-weight:1000; letter-spacing:0; line-height:1; }
    .days.urgent { color:var(--danger); } .days.soon { color:var(--warning); } .days.closed { color:var(--F); }
    .budget-amount { font-size:22px; font-weight:1000; letter-spacing:0; line-height:1.15; overflow-wrap:anywhere; }
    .budget-amount.unknown { color:var(--muted); font-size:18px; }
    .budget-meta { color:var(--muted); font-size:12px; font-weight:800; margin-top:7px; }
    .deadline-list { display:grid; gap:5px; margin-top:10px; padding-top:9px; border-top:1px solid var(--line-2); }
    .deadline-row { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; color:var(--muted); font-size:11px; line-height:1.35; }
    .deadline-row strong { color:#344054; font-size:12px; font-weight:950; text-align:right; overflow-wrap:anywhere; }
    .deadline-row.primary strong { color:#101828; }
    .deadline-row.missing strong { color:var(--F); }
    .issuer-name { font-size:18px; font-weight:750; } .issuer-meta { color:var(--muted); font-size:12px; margin-top:4px; }
    .chips { display:flex; flex-wrap:wrap; gap:8px; }
    .chip { display:inline-flex; align-items:center; border:1px solid var(--line); border-radius:999px; padding:6px 10px; background:#fff; color:#344054; font-size:12px; font-weight:850; white-space:nowrap; }
    .chip.hot { background:rgba(51,92,255,.07); color:#2442c2; border-color:rgba(51,92,255,.18); }
    .chip.stop { background:rgba(217,45,32,.07); color:#b42318; border-color:rgba(217,45,32,.18); }
    .chip.warn { background:rgba(247,144,9,.08); color:#b54708; border-color:rgba(247,144,9,.18); }
    .accordion { border-top:1px solid var(--line-2); background:#fff; }
    .accordion summary { list-style:none; padding:15px 22px 15px 26px; font-weight:400; display:flex; justify-content:space-between; align-items:center; cursor:pointer; color:#25314a; }
    .accordion summary::-webkit-details-marker { display:none; }
    .accordion summary::after { content:"+"; width:28px; height:28px; border-radius:999px; display:grid; place-items:center; background:#f2f4f7; color:#344054; font-size:18px; transition:transform .2s ease; }
    .accordion[open] summary::after { content:"-"; transform:rotate(180deg); }
    .detail-body { padding:0 22px 22px 26px; display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
    .detail-panel { border:1px solid var(--line-2); border-radius:20px; background:var(--panel-2); padding:16px; min-width:0; }
    .detail-panel h4 { margin:0 0 10px; font-size:14px; letter-spacing:0; }
    .detail-panel ul { margin:0; padding-left:1.1em; color:#475467; font-size:13px; }
    .detail-panel li + li { margin-top:6px; }
    .detail-panel a { color:#2442c2; overflow-wrap:anywhere; }
    .criteria { display:grid; gap:8px; }
    .criterion { display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center; border:1px solid var(--line-2); border-radius:14px; background:#fff; padding:10px; }
    .criterion-name { font-size:12px; color:#344054; font-weight:850; }
    .criterion-note { font-size:11px; color:var(--muted); margin-top:2px; }
    .mini-grade { min-width:34px; height:34px; display:grid; place-items:center; border-radius:12px; color:#fff; background:var(--g,var(--brand)); font-weight:950; }
    .empty { border:1px dashed var(--line); background:rgba(255,255,255,.72); border-radius:var(--radius-xl); padding:42px; text-align:center; color:var(--muted); }
    .small { color:var(--muted); font-size:12px; line-height:1.5; }
    .state-box { width:100%; min-height:120px; border:1px solid var(--line); border-radius:14px; padding:10px; resize:vertical; }
    @media (max-width:1100px) { .app { grid-template-columns:1fr; } .sidebar { position:static; height:auto; border-right:none; border-bottom:1px solid var(--line); } .sidebar-inner { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; } .db-status,.side-actions { grid-column:1/-1; } }
    @media (max-width:820px) { main { padding:18px 14px 36px; } .toolbar { grid-template-columns:1fr; } .deadline-tabs { grid-template-columns:1fr; } .bento { grid-template-columns:1fr; grid-template-areas:"title" "grade" "content" "deadline" "eligibility" "budget" "issuer" "labels"; } .detail-body { grid-template-columns:1fr; } .sidebar-inner { grid-template-columns:1fr; } }
    @media (max-width:820px) { .app,.sidebar,main { max-width:100vw; overflow-x:hidden; } .db-status .row { grid-template-columns:1fr; gap:2px; } .db-status .row strong { text-align:left; } }
    @media print { body { background:#fff; } .sidebar,.toolbar { display:none!important; } .app { display:block; } main { padding:0; } .proposal-card { break-inside:avoid; box-shadow:none; } .accordion { display:none; } }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h1>NAVICUS Research Daily DB</h1>
    <p class="sub"><span class="dot"></span>単一DB一覧</p>
    <div class="sidebar-inner">
      <section class="db-status" id="stats"></section>
      <section class="filter-card">
        <h3>検索 <span>QUERY</span></h3>
        <input id="query" class="control" type="search" placeholder="案件名・発注元・キーワード" />
      </section>
      <section class="filter-card">
        <h3>ランク <span>GRADE</span></h3>
        <select id="grade" class="select"><option value="">全ランク</option><option>S</option><option>A</option><option>B</option><option>C</option><option>D</option><option>E</option><option>F</option></select>
        <select id="gradeBasis" class="select" style="margin-top:8px"><option value="latest">現ランクで絞り込み</option><option value="best">過去最高ランクで絞り込み</option></select>
      </section>
      <section class="filter-card">
        <h3>状態 <span>STATE</span></h3>
        <select id="state" class="select"><option value="">全状態</option><option value="new">新規</option><option value="favorite">気になる</option><option value="viewed">閲覧済み</option><option value="unviewed">未閲覧</option><option value="similar">類似あり</option><option value="followup">追跡あり</option><option value="historical_ab">過去S/Aあり</option></select>
        <div class="side-actions">
          <button class="btn" id="resetFilters">リセット</button>
          <button class="btn primary" id="exportState">状態出力</button>
        </div>
      </section>
      <section class="filter-card">
        <h3>状態JSON <span>IMPORT</span></h3>
        <textarea id="stateText" class="state-box"></textarea>
        <div class="side-actions"><button class="btn" id="importState">読み込み</button></div>
      </section>
      <section class="filter-card">
        <h3>実行履歴 <span>RUNS</span></h3>
        <div id="runs"></div>
      </section>
    </div>
  </aside>
  <main>
    <div class="toolbar">
      <div class="result-title"><span class="result-count" id="resultCount">0</span><span id="resultLabel">表示中</span></div>
      <button class="btn" id="showAll">全件表示</button>
      <button class="btn" id="showSimilar">類似あり</button>
      <button class="btn" id="showBplus">B以上</button>
      <button class="btn" id="showHistoricalAB">過去S/A</button>
      <select class="page-size" id="sortBy" aria-label="並べ替え">
        <option value="rank">現ランク順（S→A→B）</option>
        <option value="best-grade">過去最高ランク順</option>
        <option value="grade">現ランク等級順</option>
        <option value="run-rank">run内順位順</option>
        <option value="deadline">提出期限が近い順</option>
        <option value="new">新規順</option>
        <option value="issuer">発注元順</option>
        <option value="title">案件名順</option>
      </select>
      <select class="page-size" id="pageSize" aria-label="1ページの表示件数">
        <option value="10">10件</option>
        <option value="25">25件</option>
        <option value="50">50件</option>
        <option value="100">100件</option>
      </select>
    </div>
    <nav class="deadline-tabs" id="deadlineTabs" aria-label="期限別表示"></nav>
    <nav class="pager" id="pagerTop"></nav>
    <section class="cards" id="cards"></section>
    <nav class="pager" id="pagerBottom"></nav>
  </main>
</div>
<script src="assets/app.js"></script>

</body>
</html>
